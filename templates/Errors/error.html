<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(0deg, rgba(42,123,155,1) 0%, rgba(0,31,100,1) 50%, rgba(0,4,57,1) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #001F64;
        }

        .error-card {
            background: #f5f6fa;
            width: 90%;
            max-width: 520px;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .codigo {
            font-size: 72px;
            font-weight: bold;
            color: #0b3873;
            margin-bottom: 10px;
        }

        h1 {
            margin: 0 0 15px;
            font-size: 28px;
        }

        p {
            font-size: 16px;
            color: #333;
            margin-bottom: 25px;
        }

        a {
            display: inline-block;
            background: #0b3873;
            color: white;
            padding: 12px 22px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            background: #001F64;
        }
    </style>
</head>
<body>

    <div class="error-card">
        <div class="codigo">{{ codigo }}</div>
        <h1>{{ titulo }}</h1>
        <p>{{ mensaje }}</p>

        <a href="{% url 'home' %}">Volver al inicio</a>
    </div>

</body>
</html>
